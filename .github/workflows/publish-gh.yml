name: Publish GitHub Package

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  detect-artifact:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      has_artifact: ${{ steps.check.outputs.has_artifact }}
    steps:
      - name: Check CI artifacts
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });

            const found = data.artifacts.some((artifact) => artifact.name === "npm-package");
            core.setOutput("has_artifact", found ? "true" : "false");

  publish:
    needs: detect-artifact
    if: needs.detect-artifact.outputs.has_artifact == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@rajat"

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish ./*.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
